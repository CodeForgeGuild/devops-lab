apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd

spec:
  generators:
    - git:
        repoURL: https://github.com/CodeForgeGuild/devops-lab.git
        revision: main
        files:
          - path: "gitops/apps/**/config.yaml"

  template:
    metadata:
      name: "{{appName}}"

    spec:
      project: default

      source:
        repoURL: "{{source.repoURL}}"
        targetRevision: "{{source.targetRevision}}"
        path: "{{source.path}}"

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{destination.namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true
